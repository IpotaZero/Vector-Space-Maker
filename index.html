<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>Vector Space Maker</title>
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                background: #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: sans-serif;
            }
            #wrap {
                text-align: center;
            }
            canvas {
                background: #fcfcfc;

                border-radius: 4px;
            }
            p {
                color: #444;
                font-size: 14px;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <canvas id="main"></canvas>
            <p>← → 移動 / ↑・Space ジャンプ / R リスタート</p>
        </div>
