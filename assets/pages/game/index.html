<link rel="stylesheet" href="assets/pages/game/index.css" />

<div class="page" id="first">
    <canvas id="main" width="800" height="600"></canvas>
</div>

<div class="page" id="clear" data-layer="1">
    <div class="kakomi">
        <h2>Clear</h2>

        <div class="options" data-direction="column">
            <button data-link="next">Back</button>
            <button data-link="retry">Retry</button>
        </div>

        <span style="opacity: 0">1</span>
    </div>
</div>

<div class="page" id="pause" data-layer="1">
    <div class="kakomi">
        <h2>Pause</h2>

        <div class="options" data-direction="column">
            <button data-link="resume">Resume</button>
            <button data-link="retry">Retry</button>
            <button data-link="next">Back</button>
        </div>

        <span style="opacity: 0">1</span>
    </div>
</div>
